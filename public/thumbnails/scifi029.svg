      <stop offset="0%" style="stop-color:#0a0a1e"/>
      <stop offset="100%" style="stop-color:#050510"/>
    </linearGradient>
  </defs>
  <rect width="160" height="100" fill="url(#bg)"/>
  <!-- Sci-fi vehicle - futuristic angular shape -->
  <path d="M15,65 L25,50 L40,40 L80,36 L120,40 L138,52 L145,65 Z" fill="#1a2a3a" stroke="#4af" stroke-width="1"/>
  <!-- Cockpit dome -->
  <ellipse cx="80" cy="40" rx="28" ry="16" fill="#1e3a5a" stroke="#4af" stroke-width="0.8"/>
  <!-- Canopy glass -->
  <ellipse cx="80" cy="39" rx="22" ry="11" fill="#1a4a7a" opacity="0.8"/>
  <!-- Side vents -->
  <line x1="30" y1="55" x2="50" y2="50" stroke="#4af" stroke-width="1" opacity="0.6"/>
  <line x1="130" y1="55" x2="110" y2="50" stroke="#4af" stroke-width="1" opacity="0.6"/>
  <!-- Wheels -->
  <circle cx="44" cy="65" r="11" fill="#0a1a2a" stroke="#4af" stroke-width="1.5"/>
  <circle cx="44" cy="65" r="5" fill="#112" stroke="#4af" stroke-width="1"/>
  <circle cx="116" cy="65" r="11" fill="#0a1a2a" stroke="#4af" stroke-width="1.5"/>
  <circle cx="116" cy="65" r="5" fill="#112" stroke="#4af" stroke-width="1"/>
  <line x1="10" y1="76" x2="150" y2="76" stroke="#4af" stroke-width="0.5" opacity="0.4"/>
  <text x="80" y="92" font-family="Arial, sans-serif" font-size="9" fill="#4af" text-anchor="middle" letter-spacing="1">SCI-FI 029</text>
</svg>
