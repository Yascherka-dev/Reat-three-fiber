<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 100" width="160" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0d0d1a"/>
    </linearGradient>
  </defs>
  <rect width="160" height="100" fill="url(#bg)"/>
  <!-- SUV silhouette - tall/boxy -->
  <rect x="22" y="42" width="116" height="25" rx="4" fill="#2a2a3a" stroke="#888" stroke-width="1"/>
  <!-- Roof - high and wide -->
  <rect x="32" y="24" width="96" height="20" rx="3" fill="#333345" stroke="#aaa" stroke-width="0.8"/>
  <!-- Windows -->
  <rect x="38" y="27" width="38" height="14" rx="2" fill="#4a6fa5" opacity="0.7"/>
  <rect x="82" y="27" width="38" height="14" rx="2" fill="#4a6fa5" opacity="0.7"/>
  <!-- Wheels -->
  <circle cx="48" cy="67" r="13" fill="#111" stroke="#555" stroke-width="1.5"/>
  <circle cx="48" cy="67" r="7" fill="#222" stroke="#777" stroke-width="1"/>
  <circle cx="112" cy="67" r="13" fill="#111" stroke="#555" stroke-width="1.5"/>
  <circle cx="112" cy="67" r="7" fill="#222" stroke="#777" stroke-width="1"/>
  <!-- Ground line -->
  <line x1="10" y1="80" x2="150" y2="80" stroke="#444" stroke-width="0.5"/>
  <!-- Label -->
  <text x="80" y="93" font-family="Arial, sans-serif" font-size="9" fill="#aaa" text-anchor="middle" letter-spacing="1">CONCEPT 040</text>
</svg>
