  <circle cx="42" cy="65" r="6" fill="#222" stroke="#777" stroke-width="1"/>
  <circle cx="118" cy="65" r="12" fill="#111" stroke="#555" stroke-width="1.5"/>
  <circle cx="118" cy="65" r="6" fill="#222" stroke="#777" stroke-width="1"/>
