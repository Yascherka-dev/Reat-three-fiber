<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 100" width="160" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0d0d1a"/>
    </linearGradient>
  </defs>
  <rect width="160" height="100" fill="url(#bg)"/>
  <!-- GT Supra - sporty coupe with wide hips -->
  <path d="M12,66 Q24,66 30,56 Q44,38 72,33 Q98,33 116,44 Q132,54 148,64 L148,66 Z" fill="#2a2a3a" stroke="#888" stroke-width="1"/>
  <!-- Wide rear haunches -->
  <path d="M116,44 Q138,50 148,64" fill="#232335" stroke="#999" stroke-width="0.5"/>
  <!-- Roof coupe -->
  <path d="M50,55 Q62,26 80,24 Q98,24 112,44" fill="#333345" stroke="#aaa" stroke-width="0.8"/>
  <!-- Windshield -->
  <path d="M58,54 Q68,28 80,26 Q96,26 108,44" fill="#4a6fa5" opacity="0.75"/>
  <!-- Wheels larger for sporty look -->
  <circle cx="44" cy="66" r="13" fill="#111" stroke="#555" stroke-width="1.5"/>
  <circle cx="44" cy="66" r="7" fill="#222" stroke="#888" stroke-width="1"/>
  <circle cx="116" cy="66" r="13" fill="#111" stroke="#555" stroke-width="1.5"/>
  <circle cx="116" cy="66" r="7" fill="#222" stroke="#888" stroke-width="1"/>
  <line x1="10" y1="79" x2="150" y2="79" stroke="#444" stroke-width="0.5"/>
  <text x="80" y="93" font-family="Arial, sans-serif" font-size="9" fill="#aaa" text-anchor="middle" letter-spacing="1">GT SUPRA</text>
</svg>
